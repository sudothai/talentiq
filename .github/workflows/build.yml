name: Build and Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/sudothai/talentiq-api

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.check.outputs.skip }}
    steps:
      - id: check
        run: |
          if [[ "${{ github.event.head_commit.message }}" == deploy:* ]]; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

  version:
    runs-on: ubuntu-latest
    needs: check
    if: needs.check.outputs.skip == 'false'
    permissions:
      packages: read
    outputs:
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - name: Generate CalVer tag
        id: version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DATE=$(date -u +%Y.%m.%d)
          # Query existing tags from GHCR package versions
          TAGS=$(gh api orgs/${{ github.repository_owner }}/packages/container/talentiq-api/versions \
            --jq '.[].metadata.container.tags[]' 2>/dev/null || \
            gh api users/${{ github.repository_owner }}/packages/container/talentiq-api/versions \
            --jq '.[].metadata.container.tags[]' 2>/dev/null || echo "")
          SEQ=0
          while echo "$TAGS" | grep -q "^${DATE}.${SEQ}$"; do
            SEQ=$((SEQ + 1))
          done
          echo "tag=${DATE}.${SEQ}" >> $GITHUB_OUTPUT

  build:
    runs-on: ubuntu-latest
    needs: [check, version]
    if: needs.check.outputs.skip == 'false'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ needs.version.outputs.tag }},enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: api/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: [build, version]
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update K8s manifest with new image tag
        run: |
          VERSION=${{ needs.version.outputs.tag }}
          sed -i "s|image: ghcr.io/sudothai/talentiq-api:.*|image: ${{ env.IMAGE_NAME }}:${VERSION} # {\"\\$imagepolicy\": \"api\"}|" k8s/api.yaml

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/api.yaml
          git diff --cached --quiet && exit 0
          git commit -m "deploy: ${{ needs.version.outputs.tag }}"
          git push
