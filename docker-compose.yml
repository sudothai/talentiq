services:
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: talentiq
      MINIO_ROOT_PASSWORD: talentiq123
    volumes:
      - minio_data:/data

  postgres:
    image: postgres:16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: talentiq
      POSTGRES_USER: talentiq
      POSTGRES_PASSWORD: talentiq123
    volumes:
      - pg_data:/var/lib/postgresql/data

  qdrant:
    image: qdrant/qdrant:v1.13.2
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    ports:
      - "8000:8000"
    environment:
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: talentiq
      MINIO_SECRET_KEY: talentiq123
      POSTGRES_URL: postgresql://talentiq:talentiq123@postgres:5432/talentiq
      QDRANT_URL: http://qdrant:6333
    depends_on:
      - minio
      - postgres
      - qdrant

volumes:
  minio_data:
  pg_data:
  qdrant_data:
